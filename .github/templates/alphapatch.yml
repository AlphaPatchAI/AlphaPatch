name: AlphaPatch

on:
  issues:
    types: [opened]
  # Uncomment to allow runs on new issue comments
  # issue_comment:
  #   types: [created]
  # Uncomment for manual runs with an issue number input
  # workflow_dispatch:
  #   inputs:
  #     issue_number:
  #       description: "Issue number to analyze"
  #       required: true
  #       type: string
  # Uncomment for scheduled runs (set a repo variable ALPHAPATCH_ISSUE_NUMBER)
  # schedule:
  #   - cron: "0 9 * * 1"

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run AlphaPatch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          ENABLE_DRAFT_PR: "1"
          ENABLE_LABELS: "1"
          TEST_COMMAND: ""
          TEST_TIMEOUT: "600"
          GIT_AUTHOR_NAME: AlphaPatch Bot
          GIT_AUTHOR_EMAIL: alphapatch-bot@users.noreply.github.com
          GIT_COMMITTER_NAME: AlphaPatch Bot
          GIT_COMMITTER_EMAIL: alphapatch-bot@users.noreply.github.com
        run: python -m bot.main --repo ${{ github.repository }} --issue ${{ inputs.issue_number || github.event.issue.number || vars.ALPHAPATCH_ISSUE_NUMBER }}
