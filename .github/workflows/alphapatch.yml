# Do not use this workflow in your project.
# Instead use the one under templates/alphapatch.yml

name: AlphaPatch

on:
  issues:
    types: [opened]
  # Optional triggers (uncomment to enable)
  # issue_comment:
  #   types: [created]
  # pull_request:
  #   types: [opened, reopened, synchronize]
  # workflow_dispatch:
  #   inputs:
  #     issue_number:
  #       description: "Issue number to analyze"
  #       required: true
  #       type: string
  # schedule:
  #   - cron: "0 9 * * 1"

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run AlphaPatch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GIT_AUTHOR_NAME: AlphaPatch Bot
          GIT_AUTHOR_EMAIL: alphapatch-bot@users.noreply.github.com
          GIT_COMMITTER_NAME: AlphaPatch Bot
          GIT_COMMITTER_EMAIL: alphapatch-bot@users.noreply.github.com
        run: python -m bot.main --repo ${{ github.repository }} --issue ${{ inputs.issue_number || github.event.issue.number || github.event.pull_request.number || vars.ALPHAPATCH_ISSUE_NUMBER }}
