name: AlphaPatch

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run AlphaPatch
        run: python -m bot.main --repo ${{ github.repository }} --issue ${{ github.event.issue.number }}
